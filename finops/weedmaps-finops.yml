description: >-
  FinOps view of Weedmaps spend. Weedmaps' partner APIs (Menu, Brand Catalog,
  Taxonomy, Orders) carry no separate per-call fee - the cost driver is the
  Weedmaps for Business listing subscription that the APIs keep in sync. That
  subscription is a monthly SaaS/advertising charge paid by dispensaries,
  delivery services, and brands, priced by market and negotiated via Weedmaps
  sales (reported retailer base ~$495/mo, delivery ~$395/mo, with large metros
  and national brand programs substantially higher). For an integration partner,
  the direct cost is the engineering and infrastructure to run the sync against
  the documented rate limits, not a metered API invoice.
notes: >-
  Weedmaps does not publish listing prices or an API price sheet publicly;
  figures are reported market observations. Per-unit API rates do not apply
  because the partner API is not separately metered as of the review date.
  Reconcile listing rates and any partner-program terms directly with Weedmaps.
