meters:
- name: listing_subscription
  description: Monthly Weedmaps for Business listing fee per storefront (retailer, delivery, or brand), market-dependent.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - listing
  - market
- name: api_requests
  description: Partner API requests against the 2,500/min integrator limit; not separately billed but constrains sync throughput.
  unit: requests
  aggregation: sum
  dimensions:
  - integrator
  - listing
- name: integration_compute
  description: Partner-side compute to run the POS-to-Weedmaps sync (no Weedmaps invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - integrator
principles:
- name: Visibility
  description: Track listing subscriptions per storefront/market and monitor API request volume against the integrator rate limit.
- name: Allocation
  description: Map each listing subscription and its sync traffic to the owning retailer/team or client account.
- name: Optimization
  description: Batch menu-item updates and reuse access tokens to stay within rate limits; review listing subscriptions against actual marketplace return per market.
- name: Accountability
  description: Assign an owner per listing and per integration; review monthly listing spend and any renegotiated market rates.
