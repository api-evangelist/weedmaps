aid: weedmaps
url: https://raw.githubusercontent.com/api-evangelist/weedmaps/refs/heads/main/apis.yml
name: Weedmaps
kind: company
description: Weedmaps is a cannabis discovery and ordering marketplace connecting
  consumers with dispensaries, delivery services, and brands. For its business
  customers it publishes a partner integration API suite - a Menu API for keeping
  a retailer's product menu, pricing, and availability in sync with their
  point-of-sale, a Brand Catalog API for mapping and enriching menu items against
  the Weedmaps brand and product taxonomy, a Taxonomy API for categories,
  cannabinoids, strains, terpenes, and discovery tags, and an Orders API for
  receiving and updating online orders in a partner POS. The developer
  documentation is public, but production access is partner-gated - integrators
  apply by email, receive OAuth2 client-credentials credentials and a test
  listing, and a Listing Owner must grant access. New integrations are noted as
  not currently being onboarded, so the endpoints below are documented but
  modeled from the public reference rather than exercised against a live account.
