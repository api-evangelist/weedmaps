apis:
- aid: weedmaps:weedmaps-menu-api
  name: Weedmaps Menu API
  tags:
  - Menu Sync
  - Menu Items
  - Point of Sale
  - Inventory
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.weedmaps.com/docs/wm-menu-api-getting-started
  baseURL: https://api-g.weedmaps.com/wm/2025-07/partners
  properties:
  - url: https://developer.weedmaps.com/docs/wm-menus
    type: Documentation
  - url: https://developer.weedmaps.com/reference/get_menus
    type: APIReference
  description: Keep a retailer's Weedmaps menu in sync with their point-of-sale.
    Retrieve menus and menu items, and create, retrieve, update, delete, and
    upsert-by-external-ID menu items to publish real-time product availability
    and dynamic pricing across single or multiple (e.g. medical vs. recreational)
    menus. Endpoints are modeled from the public reference; exact menu-item CRUD
    paths were not exercised against a live partner account.
- aid: weedmaps:weedmaps-brand-catalog-api
  name: Weedmaps Brand Catalog API
  tags:
  - Brands
  - Products
  - Reviews
  - Enrichment
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.weedmaps.com/reference/get_brands
  baseURL: https://api-g.weedmaps.com/wm/2025-07/partners
  properties:
  - url: https://developer.weedmaps.com/docs/overview
    type: Documentation
  - url: https://developer.weedmaps.com/reference/get_brands
    type: APIReference
  description: Sync or map the Weedmaps catalog of Brands and Brand Products to
    an internal catalog to improve menu-item search relevance and discoverability.
    Retrieve all brands, a single brand, the brand product catalog, an individual
    brand product, and brand product reviews.
- aid: weedmaps:weedmaps-taxonomy-api
  name: Weedmaps Taxonomy API
  tags:
  - Taxonomy
  - Categories
  - Cannabinoids
  - Strains
  - Terpenes
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.weedmaps.com/docs/core-concepts-and-structure
  baseURL: https://api-g.weedmaps.com/wm/2025-07/partners
  properties:
  - url: https://developer.weedmaps.com/docs/core-concepts-and-structure
    type: Documentation
  - url: https://developer.weedmaps.com/reference/get_menus
    type: APIReference
  description: Read-only reference taxonomy used to enrich menu items - retrieve
    cannabinoids, categories (flat and tree), strains, terpenes, and discovery
    tags. Linking menu items to these taxonomy entries increases the quality and
    discoverability of a retailer's Weedmaps menu.
- aid: weedmaps:weedmaps-orders-api
  name: Weedmaps Orders API
  tags:
  - Orders
  - Discounts
  - Fulfillment
  - Documents
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.weedmaps.com/reference/update_order_status
  baseURL: https://api-g.weedmaps.com/oos/2026-01
  properties:
  - url: https://developer.weedmaps.com/docs/overview
    type: Documentation
  - url: https://developer.weedmaps.com/reference/update_order_status
    type: APIReference
  description: Receive and manage online Weedmaps orders directly in a partner
    POS. Update order status, retrieve applicable discounts, retrieve order
    schedule time windows, and retrieve document URLs (e.g. compliance
    documents), removing manual re-entry between Weedmaps and the retailer's
    system.
